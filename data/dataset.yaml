        indicates that actual business volume with this customer significantly exceeds
        the formally approved exposure level. In practice, invoicing has continued
        well beyond the set limit, implying frequent overrides or that the limit no
        longer reflects the true scale of the relationship. [Dynamics 365 Finance]

